<div id="portfolio" class="projects-container">
  <h1
    data-aos="fade-right"
    data-aos-offset="300"
    data-aos-easing="ease-in-sine"
  >
    My work
  </h1>
  <div>
    <button
      data-aos="fade-right"
      data-aos-duration="500"
      [ngClass]="btnAll ? 'button-disabled' : 'button-active'"
      (click)="showAll()"
      class="contact-btn"
    >
      All
    </button>
    <button
      data-aos="zoom-in"
      data-aos-duration="500"
      [ngClass]="btnAngular ? 'button-disabled' : 'button-active'"
      (click)="showAngular()"
      class="contact-btn"
    >
      Angular
    </button>
    <button
      data-aos="fade-left"
      data-aos-duration="500"
      [ngClass]="btnJavascript ? 'button-disabled' : 'button-active'"
      (click)="showJavascript()"
      class="contact-btn"
    >
      Javascript
    </button>
  </div>
  <div data-aos="zoom-in" data-aos-duration="750" class="all-projects">
    <div *ngIf="Javascript" class="project">
      <div>
        <h2>Join</h2>
        <p>Javascript - Business website</p>
        <a
          class="a-btn"
          target="_blank"
          href="https://samed-azaplioglu.developerakademie.net/m/Join/"
          ><button>Try it out</button></a
        >
      </div>

      <img class="project-img" src="assets/img/join-project.png" />
    </div>

    <div *ngIf="Javascript" class="project">
      <div>
        <h2>El Pollo Loco</h2>
        <p>Javascript - OOP jump-and-run-game</p>
        <a
          target="_blank"
          href="https://samed-azaplioglu.developerakademie.net/EL_POLLO_LOCO/"
          ><button>Try it out</button></a
        >
      </div>
      <img src="assets/img/pollo.png" />
    </div>

    <div *ngIf="Angular" class="project">
      <div>
        <h2>Ring of Fire</h2>
        <p>Angular / Firebase - Popular card-game</p>
        <a
          class="a-btn"
          target="_blank"
          href="https://samed-azaplioglu.developerakademie.net/RingofFire/"
          ><button>Try it out</button></a
        >
      </div>
      <img src="assets/img/cards.jpg" />
    </div>
  </div>
</div>
